<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ số Xã Đan Hải</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #header {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 300px;
        }
        #header h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #1a73e8;
        }
        #header p {
            margin: 0;
            font-size: 12px;
            color: #5f6368;
            line-height: 1.4;
        }
        #map-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Bản đồ Xã Đan Hải</h1>
        <p>Hệ thống thông tin địa lý hành chính cơ sở<br>Cập nhật: 2026</p>
    </div>
    <div id="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27976.223846663244!2d105.7485!3d18.6833!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3139d2b0af805161%3A0xeaa2c2cbd72a1c8m!2zRGFuIEjhuqNpLCBIw6AgVMSpbmg!5e0!3m2!1svi!2svn!4v1719224400000!5m2!1svi!2svn" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>
</body>
</html>
