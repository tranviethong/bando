<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Hành chính Xã Đan Hải</title>
    <!-- Chèn thư viện CSS của Leaflet để hiển thị bản đồ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .info-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .info-title h1 { margin: 0; font-size: 18px; color: #333; }
        .info-title p { margin: 5px 0 0 0; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="info-title">
        <h1>Bản đồ Xã Đan Hải</h1>
        <p>Hệ thống thông tin địa lý - Cập nhật 2026</p>
    </div>

    <!-- Vùng chứa bản đồ -->
    <div id="map"></div>

    <!-- Chèn thư viện JavaScript của Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Khởi tạo bản đồ, định vị tâm tại xã Đan Hải (vĩ độ: 18.665, kinh độ: 105.775) và mức zoom mặc định là 13
        var map = L.map('map').setView([18.665, 105.775], 13);

        // 2. Định nghĩa các lớp nền bản đồ (Bản đồ đường bộ và Bản đồ Vệ tinh Google)
        var googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google Maps'
        });

        var googleSatellite = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google Maps Vệ Tinh'
        });

        var openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });

        // Chọn lớp nền mặc định khi mở trang web (ở đây chọn bản đồ đường phố Google)
        googleStreets.addTo(map);

        // Dữ liệu GeoJSON chi tiết xã Đan Hải của bạn
        var geojsonData = {
          "type": "FeatureCollection",
          "features": [
            {
              "type": "Feature",
              "properties": { "name": "Ranh giới toàn xã Đan Hải", "description": "Sáp nhập ngày 01/07/2025 gồm Đan Trường, Xuân Hải, Xuân Hội, Xuân Phổ", "color": "#FF0000", "weight": 3, "opacity": 0.6, "fillColor": "#FF0000", "fillOpacity": 0.05 },
              "geometry": { "type": "Polygon", "coordinates": [[[105.741, 18.663], [105.760, 18.678], [105.785, 18.692], [105.795, 18.682], [105.805, 18.670], [105.788, 18.642], [105.765, 18.635], [105.748, 18.645], [105.741, 18.663]]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Phân khu Đan Trường", "color": "#3388ff", "weight": 1, "opacity": 0.4, "fillColor": "#3388ff", "fillOpacity": 0.15 },
              "geometry": { "type": "Polygon", "coordinates": [[[105.741, 18.663], [105.760, 18.678], [105.765, 18.660], [105.748, 18.645], [105.741, 18.663]]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Phân khu Xuân Hải", "color": "#72ff33", "weight": 1, "opacity": 0.4, "fillColor": "#72ff33", "fillOpacity": 0.15 },
              "geometry": { "type": "Polygon", "coordinates": [[[105.760, 18.678], [105.778, 18.688], [105.772, 18.655], [105.765, 18.660], [105.760, 18.678]]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Phân khu Xuân Hội", "color": "#ff33f6", "weight": 1, "opacity": 0.4, "fillColor": "#ff33f6", "fillOpacity": 0.15 },
              "geometry": { "type": "Polygon", "coordinates": [[[105.778, 18.688], [105.785, 18.692], [105.795, 18.682], [105.805, 18.670], [105.788, 18.642], [105.772, 18.655], [105.778, 18.688]]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Phân khu Xuân Phổ", "color": "#ffbc33", "weight": 1, "opacity": 0.4, "fillColor": "#ffbc33", "fillOpacity": 0.15 },
              "geometry": { "type": "Polygon", "coordinates": [[[105.765, 18.660], [105.772, 18.655], [105.788, 18.642], [105.765, 18.635], [105.748, 18.645], [105.765, 18.660]]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Trục đường ĐT.546", "color": "#ff5722", "weight": 4, "opacity": 0.8, "isLine": true },
              "geometry": { "type": "LineString", "coordinates": [[105.742, 18.652], [105.755, 18.665], [105.768, 18.672], [105.780, 18.678], [105.798, 18.671]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Đường ven biển Quốc lộ 15B", "color": "#00bcd4", "weight": 4, "opacity": 0.8, "isLine": true },
              "geometry": { "type": "LineString", "coordinates": [[105.782, 18.645], [105.790, 18.662], [105.795, 18.681], [105.791, 18.691]] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Trụ sở UBND xã Đan Hải", "description": "Đặt tại Thôn Quý Du Châu", "isPoint": true },
              "geometry": { "type": "Point", "coordinates": [105.7685, 18.6712] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Cảng cá & Chợ Giang Đan Trường", "isPoint": true },
              "geometry": { "type": "Point", "coordinates": [105.7460, 18.6610] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Cảng cá Xuân Hội", "isPoint": true },
              "geometry": { "type": "Point", "coordinates": [105.7920, 18.6840] }
            }
          ]
        };

        // 3. Đọc dữ liệu GeoJSON vẽ lên bản đồ và tạo cấu trúc nhấp chuột hiển thị thông tin (Popup)
        L.geoJSON(geojsonData, {
            style: function (feature) {
                return {
                    color: feature.properties.color,
                    weight: feature.properties.weight,
                    opacity: feature.properties.opacity,
                    fillColor: feature.properties.fillColor,
                    fillOpacity: feature.properties.fillOpacity
                };
            },
            pointToLayer: function (feature, latlng) {
                if(feature.properties.isPoint) {
                    // Tạo điểm đánh dấu vòng tròn màu đỏ cho các vị trí trọng yếu
                    return L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: "#ff3333",
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    });
                }
            },
            onEachFeature: function (feature, layer) {
                var popupContent = "<strong>" + feature.properties.name + "</strong>";
                if (feature.properties.description) {
                    popupContent += "<br>" + feature.properties.description;
                }
                layer.bindPopup(popupContent);
            }
        }).addTo(map);

        // 4. Tạo nút bấm chuyển đổi nhanh lớp bản đồ (Góc phải màn hình)
        var baseMaps = {
            "Google Đường Phố": googleStreets,
            "Google Vệ Tinh": googleSatellite,
            "OpenStreetMap": openStreetMap
        };
        L.control.layers(baseMaps).addTo(map);
    </script>
</body>
</html>
